<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remise à Net — Gestion commerciale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8FAFC;color:#0F172A}
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:#0EA5E9;color:#fff}.btn-blue:hover{background:#0284C7}
.btn-ghost{background:#fff;color:#64748B;border:1px solid #E2E8F0}.btn-ghost:hover{background:#F8FAFC}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:18px;margin-bottom:14px}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid #E2E8F0;border-radius:7px;font-size:13px;font-family:inherit;color:#0F172A;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#0EA5E9}
label{display:block;font-size:12px;font-weight:600;color:#64748B;margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.s-paye{background:#D1FAE5;color:#059669}.s-impaye{background:#FEE2E2;color:#DC2626}
.s-partiel{background:#FEF3C7;color:#D97706}.s-brouillon{background:#F1F5F9;color:#64748B}
.s-accepte{background:#D1FAE5;color:#059669}.s-envoye{background:#DBEAFE;color:#3B82F6}
.s-refuse{background:#FEE2E2;color:#DC2626}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:#94A3B8;padding:0 10px 10px;text-align:left;border-bottom:1px solid #E2E8F0;letter-spacing:0.4px}
td{padding:11px 10px;font-size:13px;border-bottom:1px solid #EEF2F6}
.tr:hover td{background:#F8FAFC}.tr{cursor:pointer}
.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;flex-shrink:0}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);transition:transform 0.2s ease;z-index:100}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0!important}
  .grid2,.grid3{grid-template-columns:1fr!important}
  .kpi-grid{grid-template-columns:1fr!important}
  .menu-btn{display:flex!important}
  .overlay{display:block}
}
.menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:20px;padding:4px}
@media print{#sidebar,#topbar,.no-print{display:none!important}#main{margin-left:0!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const AC=['#0EA5E9','#8B5CF6','#EC4899','#F59E0B','#10B981','#6366F1','#EF4444'];
const init=n=>{if(!n)return'?';const p=n.trim().split(/\s+/);return(p[0]?.[0]||'')+(p[1]?.[0]||'')};
const aclr=n=>{let h=0;for(let i=0;i<(n||'').length;i++)h=n.charCodeAt(i)+((h<<5)-h);return AC[Math.abs(h)%AC.length]};
const fmt=n=>(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const tod=()=>new Date().toISOString().split('T')[0];
const dtot=d=>(d.lignes||[]).reduce((a,l)=>a+(+l.qte||0)*(+l.pu||0),0);
const mkl=()=>({id:Date.now()+Math.random(),desc:'',qte:'',pu:''});
const anum=(t,docs)=>{const p=t==='devis'?'DEV':t==='facture'?'FAC':'AVN';const y=new Date().getFullYear();const c=docs.filter(d=>d.type===t).length+1;return`${p}-${y}-${String(c).padStart(3,'0')}`};

let S={
  page:'login',
  docs:[],
  ent:{nom:'Remise à Net',adresse:'8 rue des Artisans, 74000 Annecy',tel:'06 XX XX XX XX',email:'contact@remiseanet.fr',siret:'000 000 000 00000',statut:"Auto-entrepreneur — Dispensé d'immatriculation au RCS/RM",logo:null},
  form:null,preview:null,sub:'all',q:'',listType:'devis',sidebarOpen:false
};

try{const d=localStorage.getItem('rn_docs');if(d)S.docs=JSON.parse(d)}catch(e){}
try{const e=localStorage.getItem('rn_ent');if(e)S.ent=JSON.parse(e)}catch(e){}
const save=()=>{try{localStorage.setItem('rn_docs',JSON.stringify(S.docs))}catch(e){}};
const saveEnt=()=>{try{localStorage.setItem('rn_ent',JSON.stringify(S.ent))}catch(e){}};

const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v)
  });
  children.forEach(c=>typeof c==='string'?e.appendChild(document.createTextNode(c)):c&&e.appendChild(c));
  return e
};

function r(){
  const app=document.getElementById('app');app.innerHTML='';
  if(S.page==='login'){app.appendChild(renderLogin());return}
  const shell=el('div',{style:{display:'flex',minHeight:'100vh'}});
  shell.appendChild(renderSidebar());
  if(S.sidebarOpen){const ov=el('div',{style:{position:'fixed',inset:'0',background:'rgba(15,23,42,0.4)',zIndex:'99'},onClick:()=>{S.sidebarOpen=false;r()}});shell.appendChild(ov)}
  const main=el('div',{id:'main',style:{flex:'1',display:'flex',flexDirection:'column',marginLeft:'220px'}});
  main.appendChild(renderTopBar());
  const body=el('div',{style:{padding:'24px',flex:'1',overflowY:'auto',maxWidth:'1100px'}});
  if(S.page==='tableau')body.appendChild(renderTableau());
  else if(S.page==='list')body.appendChild(renderList());
  else if(S.page==='form')body.appendChild(renderForm());
  else if(S.page==='preview')body.appendChild(renderPreview());
  else if(S.page==='clients')body.appendChild(renderClients());
  else if(S.page==='params')body.appendChild(renderParams());
  main.appendChild(body);shell.appendChild(main);app.appendChild(shell);
}

function renderLogin(){
  const wrap=el('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#F0F9FF,#E0F2FE)'}});
  const card=el('div',{style:{background:'#fff',borderRadius:'14px',boxShadow:'0 16px 48px rgba(15,23,42,0.12)',padding:'36px',width:'340px',maxWidth:'90vw'}});
  const logoRow=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'22px'}});
  const mark=el('div',{style:{width:'34px',height:'34px',borderRadius:'8px',background:'#0EA5E9',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'800',fontSize:'13px'}});mark.textContent='RN';
  const logoTxt=el('div',{style:{fontSize:'15px',fontWeight:'700'}});logoTxt.innerHTML='Remise à <span style="color:#0EA5E9">Net</span>';
  logoRow.appendChild(mark);logoRow.appendChild(logoTxt);
  const title=el('div',{style:{fontSize:'20px',fontWeight:'700',marginBottom:'6px'}});title.textContent='Connexion';
  const sub=el('div',{style:{fontSize:'13px',color:'#64748B',marginBottom:'20px'}});sub.textContent='Gérez vos devis et factures';
  const emailLbl=el('label');emailLbl.textContent='Adresse email';
  const emailIn=el('input',{type:'email',placeholder:'vous@entreprise.fr',style:{marginBottom:'12px'}});
  const passLbl=el('label');passLbl.textContent='Mot de passe';
  const passIn=el('input',{type:'password',placeholder:'••••••••',style:{marginBottom:'18px'}});
  const btn=el('button',{class:'btn btn-blue',style:{width:'100%',justifyContent:'center',padding:'11px'},onClick:()=>{S.page='tableau';r()}});btn.textContent='Se connecter →';
  const note=el('div',{style:{marginTop:'14px',fontSize:'11px',color:'#94A3B8',textAlign:'center'}});note.textContent='Données sauvegardées automatiquement dans votre navigateur';
  [logoRow,title,sub,emailLbl,emailIn,passLbl,passIn,btn,note].forEach(x=>card.appendChild(x));
  wrap.appendChild(card);return wrap;
}

const NAV=[{k:'tableau',label:'Tableau de bord',icon:'📊'},{k:'devis',label:'Devis',icon:'📄'},{k:'factures',label:'Factures',icon:'🧾'},{k:'avenants',label:'Avenants',icon:'📑'},{k:'clients',label:'Clients',icon:'👥'},{k:'params',label:'Paramètres',icon:'⚙️'}];

function renderSidebar(){
  const sb=el('div',{id:'sidebar',class:S.sidebarOpen?'open':'',style:{width:'220px',background:'#fff',borderRight:'1px solid #E2E8F0',position:'fixed',top:'0',left:'0',bottom:'0',display:'flex',flexDirection:'column',zIndex:'100'}});
  const logoRow=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'18px 16px',borderBottom:'1px solid #E2E8F0'}});
  const mark=el('div',{style:{width:'30px',height:'30px',borderRadius:'7px',background:'#0EA5E9',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'800',fontSize:'12px',flexShrink:'0'}});mark.textContent='RN';
  const logoTxt=el('div',{style:{fontSize:'14px',fontWeight:'700'}});logoTxt.innerHTML='Remise à <span style="color:#0EA5E9">Net</span>';
  logoRow.appendChild(mark);logoRow.appendChild(logoTxt);sb.appendChild(logoRow);
  const nav=el('div',{style:{padding:'10px',flex:'1',display:'flex',flexDirection:'column',gap:'2px'}});
  NAV.forEach(item=>{
    const isActive=S.page===item.k||(S.page==='list'&&((item.k==='devis'&&S.listType==='devis')||(item.k==='factures'&&S.listType==='facture')||(item.k==='avenants'&&S.listType==='avenant')))||(S.page==='form'&&((item.k==='devis'&&S.form?.type==='devis')||(item.k==='factures'&&S.form?.type==='facture')||(item.k==='avenants'&&S.form?.type==='avenant')));
    const btn=el('button',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',borderRadius:'7px',border:'none',background:isActive?'#E0F2FE':'none',color:isActive?'#0284C7':'#64748B',fontWeight:isActive?'600':'500',cursor:'pointer',fontFamily:'inherit',fontSize:'13px',textAlign:'left',width:'100%'},onClick:()=>{
      S.sidebarOpen=false;S.form=null;S.q='';S.sub='all';
      if(item.k==='tableau')S.page='tableau';
      else if(item.k==='clients')S.page='clients';
      else if(item.k==='params')S.page='params';
      else{S.page='list';S.listType=item.k==='devis'?'devis':item.k==='factures'?'facture':'avenant'}
      r();
    }});
    btn.textContent=item.icon+' '+item.label;nav.appendChild(btn);
  });
  sb.appendChild(nav);
  const footer=el('div',{style:{padding:'10px',borderTop:'1px solid #EEF2F6'}});
  const logoutBtn=el('button',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',borderRadius:'7px',border:'none',background:'none',color:'#64748B',cursor:'pointer',fontFamily:'inherit',fontSize:'13px',width:'100%'},onClick:()=>{S.page='login';r()}});
  logoutBtn.textContent='🚪 Déconnexion';footer.appendChild(logoutBtn);sb.appendChild(footer);
  return sb;
}

function renderTopBar(){
  const bar=el('div',{id:'topbar',style:{height:'52px',borderBottom:'1px solid #E2E8F0',background:'#fff',display:'flex',alignItems:'center',padding:'0 20px',gap:'10px',flexShrink:'0',position:'sticky',top:'0',zIndex:'50'}});
  const menuBtn=el('button',{class:'menu-btn no-print',onClick:()=>{S.sidebarOpen=!S.sidebarOpen;r()}});menuBtn.textContent='☰';
  const spacer=el('div',{style:{flex:'1'}});
  const av=el('div',{class:'avatar',style:{width:'28px',height:'28px',fontSize:'10px',background:aclr(S.ent.nom)}});av.textContent=init(S.ent.nom);
  const name=el('span',{style:{fontSize:'13px',fontWeight:'600'}});name.textContent=S.ent.nom;
  bar.appendChild(menuBtn);bar.appendChild(spacer);bar.appendChild(av);bar.appendChild(name);
  return bar;
}

function renderTableau(){
  const wrap=el('div');
  const hdr=el('div',{style:{marginBottom:'18px'}});
  const t=el('div',{style:{fontSize:'22px',fontWeight:'700'}});t.textContent='Tableau de bord';
  const s=el('div',{style:{fontSize:'13px',color:'#64748B',marginTop:'3px'}});s.textContent="Vue d'ensemble de votre activité";
  hdr.appendChild(t);hdr.appendChild(s);wrap.appendChild(hdr);

  const factures=S.docs.filter(d=>d.type==='facture');
  const fp=factures.filter(d=>(d.statutPaiement||'impaye')==='paye');
  const fi=factures.filter(d=>(d.statutPaiement||'impaye')==='impaye');
  const fpa=factures.filter(d=>d.statutPaiement==='partiel');
  const dv=S.docs.filter(d=>d.type==='devis').filter(d=>(d.statutPaiement||'brouillon')!=='refuse');
  const ca=fp.reduce((a,d)=>a+dtot(d),0);
  const imp=[...fi,...fpa].reduce((a,d)=>a+dtot(d),0);
  const dev=dv.reduce((a,d)=>a+dtot(d),0);

  const grid=el('div',{class:'kpi-grid',style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'16px'}});
  [[`CA encaissé`,fmt(ca),`${fp.length} facture(s) réglée(s)`,'#059669'],[`Factures non réglées`,fmt(imp),`${fi.length+fpa.length} en attente`,'#D97706'],[`Devis en cours`,fmt(dev),`${dv.length} actif(s)`,'#0EA5E9']].forEach(([lbl,val,s,clr])=>{
    const c=el('div',{class:'card',style:{borderLeft:`4px solid ${clr}`,margin:'0'}});
    const l=el('div',{style:{fontSize:'11px',fontWeight:'600',color:'#64748B',marginBottom:'8px'}});l.textContent=lbl;
    const v=el('div',{style:{fontSize:'22px',fontWeight:'700'}});v.textContent=val;
    const ss=el('div',{style:{fontSize:'11px',color:'#94A3B8',marginTop:'3px'}});ss.textContent=s;
    c.appendChild(l);c.appendChild(v);c.appendChild(ss);grid.appendChild(c);
  });
  wrap.appendChild(grid);

  const chartCard=el('div',{class:'card'});
  const ct=el('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}});ct.textContent='CA mensuel (factures réglées)';
  chartCard.appendChild(ct);
  const moisData={};fp.forEach(d=>{const dt=d.date?new Date(d.date):new Date(d.createdAt||Date.now());const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;moisData[k]=(moisData[k]||0)+dtot(d)});
  const moisKeys=Object.keys(moisData).sort().slice(-6);
  const moisNoms=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  if(!moisKeys.length){const e=el('div',{style:{textAlign:'center',padding:'28px',color:'#94A3B8',fontSize:'13px'}});e.textContent='Aucune facture réglée pour le moment';chartCard.appendChild(e)}
  else{
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    const W=640,H=180,pL=52,pR=12,pT=14,pB=30,cW=W-pL-pR,cH=H-pT-pB;
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.width='100%';svg.style.display='block';
    const vals=moisKeys.map(k=>moisData[k]);const maxV=Math.max(...vals,1);const nice=Math.ceil(maxV*1.15/100)*100||100;
    const bs=cW/moisKeys.length;const bw=Math.min(40,bs*0.46);
    [0,1,2,3,4].forEach(i=>{
      const y=pT+cH-(cH*i/4);const v=nice*i/4;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pL);line.setAttribute('y1',y);line.setAttribute('x2',W-pR);line.setAttribute('y2',y);line.setAttribute('stroke','#EEF2F6');line.setAttribute('stroke-width','1');svg.appendChild(line);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',pL-6);txt.setAttribute('y',y+4);txt.setAttribute('text-anchor','end');txt.setAttribute('font-size','10');txt.setAttribute('fill','#94A3B8');txt.textContent=v>=1000?(v/1000).toFixed(0)+'k':Math.round(v);svg.appendChild(txt);
    });
    moisKeys.forEach((k,i)=>{
      const[yy,m]=k.split('-');const lbl=moisNoms[parseInt(m)-1]+' '+yy.slice(2);const v=moisData[k];const bH=(v/nice)*cH;const x=pL+i*bs+(bs-bw)/2;const yT=pT+cH-bH;
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');rect.setAttribute('x',x);rect.setAttribute('y',yT);rect.setAttribute('width',bw);rect.setAttribute('height',Math.max(bH,2));rect.setAttribute('rx','5');rect.setAttribute('fill','#0EA5E9');svg.appendChild(rect);
      const tv=document.createElementNS('http://www.w3.org/2000/svg','text');tv.setAttribute('x',x+bw/2);tv.setAttribute('y',yT-6);tv.setAttribute('text-anchor','middle');tv.setAttribute('font-size','10');tv.setAttribute('font-weight','600');tv.setAttribute('fill','#0F172A');tv.textContent=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);svg.appendChild(tv);
      const tl=document.createElementNS('http://www.w3.org/2000/svg','text');tl.setAttribute('x',x+bw/2);tl.setAttribute('y',H-pB+18);tl.setAttribute('text-anchor','middle');tl.setAttribute('font-size','10');tl.setAttribute('fill','#64748B');tl.textContent=lbl;svg.appendChild(tl);
    });
    chartCard.appendChild(svg);
  }
  wrap.appendChild(chartCard);

  const recCard=el('div',{class:'card'});
  const rt=el('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}});rt.textContent='Activité récente';
  recCard.appendChild(rt);
  const recents=S.docs.slice(0,5);
  if(!recents.length){const e=el('div',{style:{textAlign:'center',padding:'24px',color:'#94A3B8',fontSize:'13px'}});e.textContent='Aucun document pour le moment.';recCard.appendChild(e)}
  else recCard.appendChild(makeDocTable(recents,null,true));
  wrap.appendChild(recCard);
  return wrap;
}

const STATUTS_D={brouillon:{l:'Brouillon',cls:'s-brouillon'},envoye:{l:'Envoyé',cls:'s-envoye'},accepte:{l:'Accepté',cls:'s-accepte'},refuse:{l:'Refusé',cls:'s-refuse'}};
const STATUTS_F={impaye:{l:'Non réglée',cls:'s-impaye'},partiel:{l:'Partielle',cls:'s-partiel'},paye:{l:'Réglée',cls:'s-paye'}};

function renderList(){
  const type=S.listType;
  const sMap=type==='devis'?STATUTS_D:type==='facture'?STATUTS_F:null;
  const subTabs=type==='devis'?['all','brouillon','envoye','accepte','refuse']:type==='facture'?['all','impaye','partiel','paye']:null;
  const lblMap={all:'Toutes',brouillon:'Brouillons',envoye:'Envoyés',accepte:'Acceptés',refuse:'Refusés',impaye:'Non réglées',partiel:'Partielles',paye:'Réglées'};
  const typeLabel=type==='devis'?'devis':type==='facture'?'facture':'avenant';
  let docs=S.docs.filter(d=>d.type===type);
  if(S.sub!=='all')docs=docs.filter(d=>(d.statutPaiement||(type==='devis'?'brouillon':'impaye'))===S.sub);
  if(S.q){const q=S.q.toLowerCase();docs=docs.filter(d=>d.clientNom.toLowerCase().includes(q)||d.num.toLowerCase().includes(q)||(d.chantier||'').toLowerCase().includes(q))}

  const wrap=el('div');
  const hdr=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}});
  const t=el('div',{style:{fontSize:'22px',fontWeight:'700'}});t.textContent=type==='devis'?'Devis':type==='facture'?'Factures':'Avenants';hdr.appendChild(t);
  const newBtn=el('button',{class:'btn btn-blue',onClick:()=>{
    S.page='form';S.form={type,num:anum(type,S.docs),date:tod(),clientNom:'',clientTel:'',clientAdresse:'',clientEmail:'',chantier:'',validite:'',delai:'',notes:'',devisRef:'',avenantObjet:'',statutPaiement:type==='devis'?'brouillon':'impaye',lignes:[mkl()]};r();
  }});newBtn.textContent='+ Nouveau '+typeLabel;hdr.appendChild(newBtn);wrap.appendChild(hdr);

  if(subTabs){
    const tabs=el('div',{style:{display:'flex',borderBottom:'1px solid #E2E8F0',marginBottom:'12px',overflowX:'auto'}});
    subTabs.forEach(s=>{
      const btn=el('button',{style:{padding:'8px 14px',border:'none',borderBottom:`2px solid ${S.sub===s?'#0EA5E9':'transparent'}`,background:'none',cursor:'pointer',fontSize:'12px',fontWeight:'600',color:S.sub===s?'#0284C7':'#64748B',fontFamily:'inherit',whiteSpace:'nowrap'},onClick:()=>{S.sub=s;r()}});
      btn.textContent=lblMap[s];tabs.appendChild(btn);
    });
    wrap.appendChild(tabs);
  }

  const searchWrap=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',background:'#fff',border:'1px solid #E2E8F0',borderRadius:'7px',padding:'7px 12px',marginBottom:'12px'}});
  const si=el('span',{style:{color:'#94A3B8'}});si.textContent='🔍';
  const searchIn=el('input',{placeholder:'Rechercher...',style:{flex:'1',border:'none',outline:'none',fontFamily:'inherit',background:'transparent'}});
  searchIn.value=S.q||'';searchIn.addEventListener('input',e=>{S.q=e.target.value;r()});
  searchWrap.appendChild(si);searchWrap.appendChild(searchIn);wrap.appendChild(searchWrap);

  const docCard=el('div',{class:'card'});
  if(!docs.length){const e=el('div',{style:{textAlign:'center',padding:'32px',color:'#94A3B8',fontSize:'13px'}});e.textContent='Aucun document. Créez votre premier '+typeLabel+' !';docCard.appendChild(e)}
  else docCard.appendChild(makeDocTable(docs,sMap));
  wrap.appendChild(docCard);return wrap;
}

function makeDocTable(docs,sMap,compact=false){
  const wrap=el('div',{style:{overflowX:'auto'}});
  const tbl=el('table');
  const thead=el('thead');const hr=el('tr');
  ['NUMÉRO','TYPE','MONTANT',...(sMap!==null?['STATUT']:[]),'CLIENT','CHANTIER','DATE',...(!compact?['']:[])].forEach(h=>{const th=el('th');th.textContent=h;hr.appendChild(th)});
  thead.appendChild(hr);tbl.appendChild(thead);
  const tbody=el('tbody');
  docs.forEach(doc=>{
    const ri=S.docs.indexOf(doc);const total=dtot(doc);
    const ds=doc.date?new Date(doc.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'—';
    const tl=doc.type==='devis'?'Devis':doc.type==='facture'?'Facture':'Avenant';

  const s=el('div',{style:{fontSize:'13px',color:'#64748B',marginTop:'3px'}});s.textContent='Informations affichées sur vos documents';
  hdr.appendChild(t);hdr.appendChild(s);wrap.appendChild(hdr);

  const c1=el('div',{class:'card'});const ct1=el('div',{style:{fontSize:'12px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'12px'}});ct1.textContent='Logo';c1.appendChild(ct1);
  const logoRow=el('div',{style:{display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap'}});
  const logoBox=el('div',{style:{width:'90px',height:'90px',border:'1.5px dashed #E2E8F0',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',background:'#F8FAFC'}});
  if(e.logo){const img=el('img',{style:{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}});img.src=e.logo;logoBox.appendChild(img)}
  else{const ph=el('span',{style:{fontSize:'11px',color:'#94A3B8',textAlign:'center',padding:'6px'}});ph.textContent='Aucun logo';logoBox.appendChild(ph)}
  const logoRight=el('div');const lbl2=el('label');lbl2.textContent='Choisir une image (PNG, JPG)';
  const fileIn=el('input',{type:'file',accept:'image/*'});fileIn.addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=ev2=>{S.ent.logo=ev2.target.result;saveEnt();r()};fr.readAsDataURL(f)});
  const remBtn=el('button',{class:'btn btn-ghost',style:{marginTop:'8px',fontSize:'12px',padding:'6px 10px'},onClick:()=>{S.ent.logo=null;saveEnt();r()}});remBtn.textContent='Retirer le logo';
  logoRight.appendChild(lbl2);logoRight.appendChild(fileIn);logoRight.appendChild(remBtn);logoRow.appendChild(logoBox);logoRow.appendChild(logoRight);c1.appendChild(logoRow);wrap.appendChild(c1);

  const c2=el('div',{class:'card'});const ct2=el('div',{style:{fontSize:'12px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'12px'}});ct2.textContent="Informations de l'entreprise";c2.appendChild(ct2);
  [['Nom','p-nom',e.nom],['Téléphone','p-tel',e.tel],['Adresse','p-adresse',e.adresse],['Email','p-email',e.email],['SIRET','p-siret',e.siret],['Mention de statut','p-statut',e.statut]].forEach(([lbl,id,val])=>{
    const d=el('div',{style:{marginBottom:'10px'}});const l=el('label');l.textContent=lbl;const inp=el('input',{id});inp.value=val||'';d.appendChild(l);d.appendChild(inp);c2.appendChild(d);
  });
  wrap.appendChild(c2);

  const btnRow=el('div',{style:{display:'flex',gap:'10px',alignItems:'center'}});
  const msg=el('span',{style:{fontSize:'13px',color:'#059669',fontWeight:'500'}});
  const saveBtn=el('button',{class:'btn btn-blue',onClick:()=>{
    ['nom','tel','adresse','email','siret','statut'].forEach(k=>{const inp=document.getElementById('p-'+k);if(inp)S.ent[k]=inp.value});
    saveEnt();msg.textContent='✅ Paramètres enregistrés';setTimeout(()=>{msg.textContent=''},2500);
  }});saveBtn.textContent='💾 Enregistrer';
  btnRow.appendChild(saveBtn);btnRow.appendChild(msg);wrap.appendChild(btnRow);
  return wrap;
}

r();
</script>
